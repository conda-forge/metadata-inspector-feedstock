{% set name = "metadata-inspector" %}
{% set version = "2025.7.11" %}
package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/metadata_inspector-{{ version }}.tar.gz
  sha256: a7ccb8ddf2f38b3a05ece030f5668b040c69080d0fdb6494b2a03e42e0a584aa
build:
  entry_points:
    - metadata-inspector = metadata_inspector:cli
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - cftime
    - cfgrib
    - dask-core
    - hurry.filesize
    - h5netcdf
    - netcdf4
    - numpy >=1.20.3
    - requests
    - setuptools
    - xarray
    - zarr
    - aiohttp

test:
  imports:
    - metadata_inspector
  commands:
    - pip check
    - metadata-inspector --help
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/FREVA-CLINT/metadata-inspektor.git
  summary: Inspect metadata of weather/climate datasets
  dev_url: https://github.com/FREVA-CLINT/metadata-inspektor
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - antarcticrainforest
